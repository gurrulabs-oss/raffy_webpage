name: SEO Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO sync
        run: node scripts/seo_sync.mjs

      - name: Generate sitemap and robots
        run: node scripts/seo_sitemap.mjs

      - name: Validate SEO
        run: node scripts/seo_validate.mjs
